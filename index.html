<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maren AI Radar | 24h AI 信号雷达</title>
<style>
:root {
  --bg: #0f1117;
  --bg2: #161822;
  --bg3: #1c1f2e;
  --bg4: #232742;
  --border: #2a2d3e;
  --text: #e1e4ed;
  --text2: #9ca3b4;
  --text3: #6b7280;
  --accent: #6366f1;
  --accent2: #818cf8;
  --red: #ef4444;
  --orange: #f59e0b;
  --green: #22c55e;
  --blue: #3b82f6;
  --purple: #a855f7;
  --teal: #14b8a6;
  --radius: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Noto Sans SC', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
a { color: var(--accent2); text-decoration: none; }
a:hover { text-decoration: underline; }
.container { max-width: 960px; margin: 0 auto; padding: 16px; }

/* Header */
.header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0 12px; border-bottom: 1px solid var(--border); margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
.header h1 { font-size: 20px; font-weight: 700; }
.header h1 span { color: var(--accent2); }
.header .meta { font-size: 13px; color: var(--text2); }

/* Stats bar */
.stats { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
.stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 14px; min-width: 70px; text-align: center; cursor: pointer; transition: border-color 0.15s; }
.stat-card:hover { border-color: var(--accent); }
.stat-card .num { font-size: 20px; font-weight: 700; }
.stat-card .label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; }
.stat-card.s .num { color: var(--red); }
.stat-card.a .num { color: var(--orange); }
.stat-card.b .num { color: var(--blue); }
.stat-card.c .num { color: var(--text2); }
.stat-card.active-filter { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }

/* Controls */
.controls { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; align-items: center; }
.search-box { flex: 1; min-width: 180px; padding: 8px 12px; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-size: 14px; outline: none; }
.search-box:focus { border-color: var(--accent); }
.search-box::placeholder { color: var(--text2); }
.filter-group { display: flex; gap: 4px; flex-wrap: wrap; }
.filter-btn { padding: 6px 12px; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text2); font-size: 12px; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.filter-btn:hover { border-color: var(--accent); color: var(--text); }
.filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.filter-btn.active-filter { background: rgba(99,102,241,0.15); border-color: var(--accent); color: var(--accent2); }
.sort-select { padding: 6px 10px; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-size: 12px; cursor: pointer; }
.filter-label { font-size: 11px; color: var(--text3); margin-right: 2px; }

/* Collapse / Expand */
.collapse-bar { display: flex; justify-content: center; padding: 8px; cursor: pointer; color: var(--accent2); font-size: 13px; border-top: 1px solid var(--border); margin-top: -1px; transition: background 0.15s; border-radius: 0 0 var(--radius) var(--radius); }
.collapse-bar:hover { background: var(--bg3); }

/* Item list */
.item-list { display: flex; flex-direction: column; gap: 8px; }
.item-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; transition: border-color 0.15s; }
.item-card:hover { border-color: var(--accent); }
.item-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 4px; }
.item-title { font-size: 14px; font-weight: 600; color: var(--text); flex: 1; line-height: 1.5; }
.item-title a { color: inherit; }
.item-title a:hover { color: var(--accent2); }
.item-badges { display: flex; gap: 4px; flex-shrink: 0; align-items: center; flex-wrap: wrap; }
.grade-badge { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 11px; font-weight: 700; letter-spacing: 0.5px; }
.grade-S { background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
.grade-A { background: rgba(245,158,11,0.15); color: var(--orange); border: 1px solid rgba(245,158,11,0.3); }
.grade-B { background: rgba(59,130,246,0.15); color: var(--blue); border: 1px solid rgba(59,130,246,0.3); }
.grade-C { background: rgba(156,163,180,0.15); color: var(--text2); border: 1px solid rgba(156,163,180,0.2); }
.source-badge { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 600; }
.source-badge.type-radar { background: rgba(168,85,247,0.15); color: var(--purple); border: 1px solid rgba(168,85,247,0.2); }
.source-badge.type-rss { background: rgba(59,130,246,0.15); color: var(--blue); border: 1px solid rgba(59,130,246,0.2); }
.source-badge.type-wechat { background: rgba(34,197,94,0.15); color: #22c55e; border: 1px solid rgba(34,197,94,0.2); }
.source-badge.type-twitter { background: rgba(14,165,233,0.15); color: #0ea5e9; border: 1px solid rgba(14,165,233,0.2); }
.source-badge.type-xiaohongshu { background: rgba(244,63,94,0.15); color: #f43f5e; border: 1px solid rgba(244,63,94,0.2); }
.source-badge.type-scrape { background: rgba(20,184,166,0.15); color: var(--teal); border: 1px solid rgba(20,184,166,0.2); }
.score-pill { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 11px; font-weight: 600; background: var(--bg3); color: var(--text); }
.item-meta { display: flex; gap: 8px; font-size: 12px; color: var(--text2); flex-wrap: wrap; align-items: center; margin-top: 2px; }
.item-meta .meta-tag { padding: 1px 6px; border-radius: 3px; font-size: 11px; }
.item-meta .cat-tag { background: var(--bg3); }
.cat-AI-Coding { background: rgba(99,102,241,0.15); color: var(--accent2); }
.cat-Agent { background: rgba(168,85,247,0.15); color: var(--purple); }
.cat-开源 { background: rgba(34,197,94,0.15); color: var(--green); }
.cat-产品 { background: rgba(59,130,246,0.15); color: var(--blue); }
.cat-商业 { background: rgba(245,158,11,0.15); color: var(--orange); }
.cat-多模态 { background: rgba(20,184,166,0.15); color: var(--teal); }
.cat-其他 { background: rgba(107,114,128,0.15); color: var(--text3); }
.item-reasons { font-size: 12px; color: var(--text2); margin-top: 4px; padding: 4px 8px; background: var(--bg3); border-radius: 4px; }

/* Source health */
.source-health { margin-top: 16px; padding: 14px; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); }
.source-health h3 { font-size: 14px; margin-bottom: 8px; color: var(--text2); display: flex; justify-content: space-between; cursor: pointer; }
.source-health h3 .toggle { font-size: 12px; color: var(--accent2); }
.health-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 6px; overflow: hidden; transition: max-height 0.3s; }
.health-grid.collapsed { max-height: 0; }
.health-item { font-size: 12px; display: flex; justify-content: space-between; padding: 3px 0; border-bottom: 1px solid var(--border); }
.health-item .name { color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 140px; }
.health-item .count { color: var(--accent2); font-weight: 600; font-size: 11px; }

/* Result count */
.result-count { font-size: 13px; color: var(--text2); margin-bottom: 8px; }

/* Empty */
.empty-msg { text-align: center; padding: 40px; color: var(--text2); font-size: 15px; }

/* Footer */
.footer { margin-top: 24px; padding-top: 16px; border-top: 1px solid var(--border); font-size: 12px; color: var(--text2); text-align: center; }

/* Responsive */
@media (max-width: 640px) {
  .header h1 { font-size: 17px; }
  .stats { gap: 6px; }
  .stat-card { min-width: 55px; padding: 8px; }
  .stat-card .num { font-size: 16px; }
  .controls { flex-direction: column; align-items: stretch; }
  .filter-group { justify-content: center; }
}

/* Tab Navigation */
.tab-bar { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
.tab-btn { padding: 8px 18px; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text2); font-size: 13px; cursor: pointer; transition: all 0.15s; font-weight: 500; }
.tab-btn:hover { border-color: var(--accent); color: var(--text); }
.tab-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.tab-pane { display: none; }
.tab-pane.active { display: block; }

/* Story card */
.story-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 8px; transition: border-color 0.15s; }
.story-card:hover { border-color: var(--accent); }
.story-card .story-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; line-height: 1.5; }
.story-card .story-title a { color: var(--text); }
.story-card .story-title a:hover { color: var(--accent2); }
.story-badges { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; margin-bottom: 4px; }
.story-meta { display: flex; gap: 8px; font-size: 12px; color: var(--text2); flex-wrap: wrap; align-items: center; }
.story-sources { font-size: 11px; color: var(--text3); margin-top: 4px; background: var(--bg3); padding: 4px 8px; border-radius: 4px; }
.heat-text { margin-top: 6px; font-size: 11px; color: var(--text3); line-height: 1.5; }
.heat-text strong { color: var(--orange); font-weight: 600; }
.heat-text.up strong { color: var(--green); }
.heat-text.down strong { color: var(--text2); }
.heat-text.hot strong { color: var(--red); }
.item-card.clickable { cursor: pointer; }
.item-card.clickable:hover { border-color: var(--accent); }
.item-card .open-story-hint { font-size: 11px; color: var(--accent2); margin-top: 6px; }

/* Story modal */
.story-modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; }
.story-modal-backdrop.open { display: flex; }
.story-modal { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; max-width: 720px; width: 100%; max-height: 85vh; overflow: auto; padding: 18px 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.4); }
.story-modal-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 12px; }
.story-modal-title { font-size: 16px; font-weight: 700; line-height: 1.5; }
.story-modal-close { background: var(--bg3); border: 1px solid var(--border); color: var(--text2); border-radius: 6px; padding: 4px 10px; cursor: pointer; flex-shrink: 0; }
.story-modal-close:hover { color: var(--text); border-color: var(--accent); }
.story-modal-items { margin-top: 12px; }
.story-modal-item { padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 6px; background: var(--bg3); font-size: 13px; }
.story-modal-item a { color: var(--text); font-weight: 500; }
.story-modal-item a:hover { color: var(--accent2); }
.story-modal-item-meta { font-size: 11px; color: var(--text3); margin-top: 4px; }

/* Health panel */
.health-summary { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
.health-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 16px; text-align: center; min-width: 85px; }
.health-card .num { font-size: 20px; font-weight: 700; }
.health-card .label { font-size: 11px; color: var(--text2); margin-top: 2px; }
.health-table-wrap { overflow-x: auto; }
.health-table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 500px; }
.health-table th { text-align: left; padding: 7px 8px; background: var(--bg3); color: var(--text2); border-bottom: 1px solid var(--border); font-weight: 500; white-space: nowrap; }
.health-table td { padding: 6px 8px; border-bottom: 1px solid var(--border); vertical-align: middle; }
.health-table .ok { color: var(--green); font-weight: 600; }
.health-table .fail { color: var(--red); font-weight: 600; }
.health-table .ai-bar { display: inline-block; height: 6px; border-radius: 3px; background: var(--accent); margin-right: 4px; vertical-align: middle; }
</style>
</head>
<body>

    <h1>📡 <span>Maren AI</span> Radar</h1>

<script>
const SNAPSHOT_URL = 'data/latest-snapshot.json';
let allItems = [];
let allData = {};

// Filter state
const filters = { grade: 'all', cat: 'all', srctype: 'all' };
const COLLAPSE_TOP = 15;

const CAT_CLASSES = {
  'AI 编程': 'cat-AI-Coding',
  'AI Coding': 'cat-AI-Coding',
  '智能体': 'cat-Agent',
  'Agent': 'cat-Agent',
  '模型': 'cat-产品',
  '开源': 'cat-开源',
  '产品': 'cat-产品',
  '商业': 'cat-商业',
  '多模态': 'cat-多模态',
  '其他': 'cat-其他',
};

const CAT_ALIASES = {
  '智能体': ['智能体', 'Agent'],
  'AI 编程': ['AI 编程', 'AI Coding'],
  '模型': ['模型'],
  '开源': ['开源'],
  '产品': ['产品'],
  '商业': ['商业'],
  '多模态': ['多模态'],
  '其他': ['其他'],
};

const DISCOVERY_LABELS = { keyword: '关键词', viral: '爆款', creator: '博主' };
const DOMESTIC_SOURCES = ['36氪', 'IT之家', '知乎', '少数派'];

function discoveryTag(it) {
  const mode = it.discovery_mode;
  if (!mode) return '';
  const label = DISCOVERY_LABELS[mode] || mode;
  const kw = it.keyword ? `·${it.keyword}` : '';
  return `<span class="meta-tag">🏷 ${label}${kw}</span>`;
}

function getSourceBucket(it) {
  const src = it.source || '';
  const st = (it.source_type || '').toLowerCase();
  const url = (it.url || '').toLowerCase();
  if (st === 'wechat' || src.includes('公众号') || url.includes('/wechat/') || url.includes('mp.weixin.qq.com')) return 'wechat';
  if (st === 'twitter' || url.includes('x.com/') || url.includes('twitter.com/') || url.includes('/twitter/') || src.includes('Twitter·')) return 'twitter';
  if (st === 'xiaohongshu' || url.includes('xiaohongshu.com') || url.includes('xhslink.com') || url.includes('/xiaohongshu/') || src.includes('小红书·')) return 'xiaohongshu';
  if (DOMESTIC_SOURCES.some(name => src.includes(name))) return 'domestic';
  if (url.includes('rsshub') || src.toLowerCase().includes('rsshub')) return 'rsshub';
  if (st === 'radar' || st === 'aggregator') return 'radar';
  if (st === 'rss' || st === 'official' || st === 'github') return 'rss';
  return st || 'other';
}

function translateTitle(title) {
  if (!title) return '';
  const dict = {
    'Agent': '智能体', 'Agents': '智能体', 'agent': '智能体', 'agents': '智能体',
    'release': '发布', 'Release': '发布', 'launch': '发布',
    'update': '更新', 'Update': '更新', 'benchmark': '基准测试',
    'open source': '开源', 'Open Source': '开源', 'model': '模型',
    'code': '代码', 'Code': '代码', 'blog': '博客',
    'mcp': 'MCP协议', 'MCP': 'MCP协议',
    'benchmark': '基准', 'Benchmark': '基准',
  };
  let zh = title;
  for (const [en, cn] of Object.entries(dict).sort((a, b) => b[0].length - a[0].length)) {
    zh = zh.replace(new RegExp(en.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'g'), cn);
  }
  return zh;
}

function formatTime(isoStr) {
  if (!isoStr) return '';
  try {
    const d = new Date(isoStr);
    const now = new Date();
    const diffMs = now - d;
    const diffM = Math.round(diffMs / 60000);
    if (diffM < 1) return '刚刚';
    if (diffM < 60) return `${diffM}分钟前`;
    const diffH = Math.round(diffM / 60);
    if (diffH < 24) return `${diffH}h前`;
    const diffD = Math.round(diffH / 24);
    return `${diffD}d前`;
  } catch { return ''; }
}

function renderStats() {
  const items = allItems;
  const counts = { S: 0, A: 0, B: 0, C: 0 };
  items.forEach(it => { const g = it.grade; if (counts[g] !== undefined) counts[g]++; });
  const sources = new Set(items.map(it => it.source)).size;
  const failed = allData.failed_sources ? allData.failed_sources.length : 0;
  document.getElementById('statsBar').innerHTML = `
    <div class="stat-card s ${filters.grade === 'S' ? 'active-filter' : ''}" data-grade="S"><div class="num">${counts.S}</div><div class="label">S 爆款</div></div>
    <div class="stat-card a ${filters.grade === 'A' ? 'active-filter' : ''}" data-grade="A"><div class="num">${counts.A}</div><div class="label">A 热</div></div>
    <div class="stat-card b ${filters.grade === 'B' ? 'active-filter' : ''}" data-grade="B"><div class="num">${counts.B}</div><div class="label">B 关注</div></div>
    <div class="stat-card c ${filters.grade === 'C' ? 'active-filter' : ''}" data-grade="C"><div class="num">${counts.C}</div><div class="label">C 一般</div></div>
    <div class="stat-card ${filters.grade === 'all' ? 'active-filter' : ''}" data-grade="all"><div class="num">${sources}</div><div class="label">信源</div></div>
    <div class="stat-card"><div class="num">${items.length}</div><div class="label">总计</div></div>
    ${failed ? `<div class="stat-card"><div class="num" style="color:var(--red)">${failed}</div><div class="label">失败</div></div>` : ''}
  `;
}

function formatHeatText(points, delta) {
  if (!points || points.length < 2) return '';
  const n = points.length;
  const first = points[0];
  const last = points[points.length - 1];
  const scores = points.map(p => p.score || 0);
  const avg = Math.round(scores.reduce((a, b) => a + b, 0) / scores.length);
  const scoreDelta = (last.score || 0) - (first.score || 0);
  const srcDelta = delta ?? ((last.source_count || 1) - (first.source_count || 1));

  let label = '热度平稳';
  let cls = '';
  if (scores.every(s => s >= 95)) { label = '持续高热'; cls = 'hot'; }
  else if (scoreDelta >= 8 || srcDelta > 0) { label = '持续升温'; cls = 'up'; }
  else if (scoreDelta <= -8) { label = '正在降温'; cls = 'down'; }

  const parts = [`<strong>${label}</strong>`, `近${n}次抓取`, `均分${avg}`];
  if (srcDelta > 0) parts.push(`+${srcDelta}源共振`);
  else if ((last.source_count || 1) > 1) parts.push(`${last.source_count}源`);
  if (scoreDelta !== 0) parts.push(`评分 ${first.score || 0}→${last.score || 0}`);
  return `<div class="heat-text ${cls}">📈 ${parts.join(' · ')}</div>`;
}

function filterSummary() {
  const parts = [];
  if (filters.grade !== 'all') parts.push(`等级 ${filters.grade}`);
  if (filters.cat !== 'all') parts.push(`分类 ${filters.cat}`);
  if (filters.srctype !== 'all') {
    const labels = { radar: '聚合', rss: '官方', rsshub: 'RSSHub', domestic: '国内', wechat: '公众号', twitter: 'Twitter', xiaohongshu: '小红书' };
    parts.push(`来源 ${labels[filters.srctype] || filters.srctype}`);
  }
  const q = document.getElementById('searchInput').value.trim();
  if (q) parts.push(`搜索 "${q}"`);
  return parts.length ? ` · ${parts.join(' · ')}` : '';
}

function renderItems(items) {
  const list = document.getElementById('itemList');
  const countEl = document.getElementById('resultCount');
  if (!items.length) {
    countEl.textContent = '';
    list.innerHTML = '<div class="empty-msg">暂无匹配的信号</div>';
    return;
  }

  const showAll = list.dataset.showAll === 'true';
  const display = showAll ? items : items.slice(0, COLLAPSE_TOP);
  const hiddenCount = items.length - COLLAPSE_TOP;

  countEl.textContent = `共 ${items.length} 条${filterSummary()}`;

  list.innerHTML = display.map(it => {
    const catCls = CAT_CLASSES[it.category] || 'cat-其他';
    const zhTitle = translateTitle(it.title);
    const timeStr = formatTime(it.published_at);
    const reasonStr = (it.reasons || []).slice(0, 2).join(' · ');
    const sources = (it.source_names || []).slice(0, 3).join(', ');
    const sourceShort = (it.source || '').replace(/^https?:\/\//, '').split('/')[0];
    const stType = it.source_type || 'rss';
    const heatTrend = it.heat_trend || [];
    const storyId = it.story_id || '';
    const heatHtml = heatTrend.length >= 2
      ? formatHeatText(heatTrend, it.heat_delta)
      : (it.source_count > 1 ? `<div class="heat-text"><strong>多源共振</strong> · ${it.source_count} 个来源同时出现</div>` : '');
    const clickable = storyId ? ' clickable' : '';
    const storyHint = storyId ? '<div class="open-story-hint">点击查看故事线 · 覆盖多源详情</div>' : '';
    return `
      <div class="item-card${clickable}" data-story-id="${storyId}">
        <div class="item-top">
          <div class="item-title"><a href="${it.url || '#'}" target="_blank" rel="noopener">${zhTitle || it.title}</a></div>
          <div class="item-badges">
            <span class="grade-badge grade-${it.grade}">${it.grade}</span>
            <span class="score-pill">${it.score}</span>
            <span class="source-badge type-${stType}">${stType}</span>
          </div>
        </div>
        <div class="item-meta">
          <span class="meta-tag cat-tag ${catCls}">${it.category}</span>
          <span class="meta-tag">${sourceShort}</span>
          ${it.source_count > 1 ? `<span class="meta-tag">🔗 ${it.source_count}源</span>` : ''}
          ${sources ? `<span class="meta-tag">📡 ${sources}</span>` : ''}
          ${discoveryTag(it)}
          ${timeStr ? `<span>🕐 ${timeStr}</span>` : ''}
          ${it.importance_label ? `<span>⭐ ${it.importance_label}</span>` : ''}
        </div>
        ${reasonStr ? `<div class="item-reasons">💡 ${reasonStr}</div>` : ''}
        ${heatHtml}
        ${storyHint}
      </div>`;
  }).join('');

  // Collapse/expand button
  if (items.length > COLLAPSE_TOP) {
    const bar = document.createElement('div');
    bar.className = 'collapse-bar';
    bar.textContent = showAll ? `▲ 收起，只显示 Top ${COLLAPSE_TOP}` : `▼ 展开全部 ${items.length} 条（+${hiddenCount}）`;
    bar.onclick = () => {
      list.dataset.showAll = list.dataset.showAll === 'true' ? '' : 'true';
      renderItems(items);
    };
    list.appendChild(bar);
  }
}

function renderSourceHealth(items) {
  const grid = document.getElementById('healthGrid');
  const srcMap = {};
  items.forEach(it => {
    const name = (it.source || '').replace(/^https?:\/\//, '').split('/')[0] || '未知';
    if (!srcMap[name]) srcMap[name] = { count: 0, grades: {} };
    srcMap[name].count++;
    srcMap[name].grades[it.grade] = (srcMap[name].grades[it.grade] || 0) + 1;
  });
  const sorted = Object.entries(srcMap).sort((a, b) => b[1].count - a[1].count);
  grid.innerHTML = sorted.map(([name, info]) => {
    const gStr = Object.entries(info.grades).map(([g, n]) => `${g}:${n}`).join(' ');
    return `<div class="health-item"><span class="name" title="${name}">${name}</span><span class="count">${info.count}条 ${gStr}</span></div>`;
  }).join('');
  document.getElementById('sourceHealth').style.display = sorted.length ? '' : 'none';
}

function setFilter(group, val) {
  filters[group] = val;
  document.querySelectorAll(`.filter-btn[data-group="${group}"]`).forEach(b => {
    b.classList.toggle('active', b.dataset.val === val);
  });
  if (document.querySelector('.tab-btn.active')?.dataset.tab !== 'all') {
    switchTab('all');
  } else {
    applyFilters();
  }
}

function toggleHealth() {
  const grid = document.getElementById('healthGrid');
  const toggle = document.getElementById('healthToggle');
  const isCollapsed = grid.classList.contains('collapsed');
  grid.classList.toggle('collapsed');
  toggle.textContent = isCollapsed ? '▲ 收起' : '▼ 展开';
}

function applyFilters() {
  let items = [...allItems];

  // Grade filter
  if (filters.grade !== 'all') {
    items = items.filter(it => it.grade === filters.grade);
  }
  // Category filter
  if (filters.cat !== 'all') {
    const allowed = CAT_ALIASES[filters.cat] || [filters.cat];
    items = items.filter(it => allowed.includes(it.category));
  }
  // Source type filter
  if (filters.srctype !== 'all') {
    items = items.filter(it => getSourceBucket(it) === filters.srctype);
  }
  // Search
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  if (q) {
    items = items.filter(it =>
      (it.title || '').toLowerCase().includes(q) ||
      (it.category || '').toLowerCase().includes(q) ||
      (it.source || '').toLowerCase().includes(q) ||
      (it.importance_label || '').toLowerCase().includes(q)
    );
  }
  // Sort
  const sortKey = document.getElementById('sortSelect').value;
  if (sortKey === 'score-desc') items.sort((a, b) => (b.score || 0) - (a.score || 0));
  else if (sortKey === 'score-asc') items.sort((a, b) => (a.score || 0) - (b.score || 0));
  else if (sortKey === 'time-desc') items.sort((a, b) => (b.published_at || '').localeCompare(a.published_at || ''));
  else if (sortKey === 'time-asc') items.sort((a, b) => (a.published_at || '').localeCompare(b.published_at || ''));
  else if (sortKey === 'source') items.sort((a, b) => (a.source || '').localeCompare(b.source || '') || (b.score || 0) - (a.score || 0));

  // Reset collapse
  document.getElementById('itemList').dataset.showAll = '';

  renderStats();
  renderItems(items);
  renderSourceHealth(allItems);
}

async function loadData() {
  try {
    const v = Date.now();
    const [snapResp, storiesResp] = await Promise.all([
      fetch(`${SNAPSHOT_URL}?v=${v}`, { cache: 'no-store' }),
      fetch(`data/stories-merged.json?v=${v}`, { cache: 'no-store' }),
    ]);
    if (!snapResp.ok) throw new Error(snapResp.status);
    allData = await snapResp.json();
    allItems = allData.items || [];
    if (storiesResp.ok) {
      const storiesJson = await storiesResp.json();
      storiesData = storiesJson.stories || [];
      buildStoryIndex();
    }
    document.getElementById('updateTime').textContent =
      `更新于 ${allData.run_time || ''} · 总数 ${allData.total_items || 0}`;
    applyFilters();
  } catch (e) {
    document.getElementById('itemList').innerHTML =
      `<div class="empty-msg">⚠️ 数据加载失败：${e.message}<br>请确认 data/latest-snapshot.json 存在</div>`;
  }
}

// Event delegation keeps filters working after stats re-render
document.getElementById('filterPanel').addEventListener('click', (e) => {
  const btn = e.target.closest('.filter-btn');
  if (!btn || !btn.dataset.group) return;
  setFilter(btn.dataset.group, btn.dataset.val);
});
document.getElementById('statsBar').addEventListener('click', (e) => {
  const card = e.target.closest('.stat-card[data-grade]');
  if (!card) return;
  setFilter('grade', card.dataset.grade);
});
document.getElementById('searchInput').addEventListener('input', applyFilters);
document.getElementById('sortSelect').addEventListener('change', applyFilters);

// === Tab switching ===
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.toggle('active', p.id === `tab-${tab}`));
  if (tab === 'stories') loadStories();
  if (tab === 'health') loadHealth();
  if (tab === 'all') applyFilters();
}

// === Story rendering ===
let storiesData = [];
let storyById = {};

function buildStoryIndex() {
  storyById = {};
  const itemToStory = {};
  for (const s of storiesData) {
    if (s.story_id) storyById[s.story_id] = s;
    for (const id of s.cluster_item_ids || []) itemToStory[id] = s.story_id;
  }
  for (const it of allItems) {
    if (!it.story_id && it.id && itemToStory[it.id]) {
      it.story_id = itemToStory[it.id];
    }
  }
}

function findStoryForItem(item) {
  if (item.story_id && storyById[item.story_id]) return storyById[item.story_id];
  const title = (item.title || '').toLowerCase();
  return storiesData.find(s => {
    const st = (s.title || '').toLowerCase();
    return st && (st.includes(title.slice(0, 20)) || title.includes(st.slice(0, 20)));
  });
}

function openStoryModal(storyId, fallbackItem) {
  const story = storyById[storyId] || (fallbackItem ? findStoryForItem(fallbackItem) : null);
  if (!story) {
    switchTab('stories');
    return;
  }
  const modal = document.getElementById('storyModal');
  const titleEl = document.getElementById('storyModalTitle');
  const bodyEl = document.getElementById('storyModalBody');
  const trend = story.heat_trend || [];
  const delta = Number(story.heat_delta || 0);
  const items = story.cluster_items || [];
  titleEl.innerHTML = `<span class="grade-badge grade-${story.importance_label}">${story.importance_label}</span> ${translateTitle(story.title)}`;
  bodyEl.innerHTML = `
    <div class="story-meta">
      <span>📡 ${story.source_count} 个信源</span>
      <span>📦 ${story.item_count || items.length} 条相关</span>
      <span>⭐ 综合分 ${story.importance_score}</span>
    </div>
    ${(story.source_names || []).length ? `<div class="story-sources">📰 覆盖: ${(story.source_names || []).join(', ')}</div>` : ''}
    ${trend.length >= 2 ? formatHeatText(trend, delta) : ''}
    <div class="story-modal-items">
      <div style="font-size:12px;color:var(--text2);margin-bottom:6px">故事线关联条目</div>
      ${items.length ? items.map(it => `
        <div class="story-modal-item">
          <a href="${it.url || '#'}" target="_blank" rel="noopener">${it.title || '无标题'}</a>
          <div class="story-modal-item-meta">${it.source || ''} · ${it.grade || ''} · ${it.score || ''}</div>
        </div>`).join('') : `<div class="story-modal-item"><a href="${story.primary_url || '#'}" target="_blank" rel="noopener">查看原文</a></div>`}
    </div>`;
  modal.classList.add('open');
}

function closeStoryModal() {
  document.getElementById('storyModal').classList.remove('open');
}

document.getElementById('itemList').addEventListener('click', (e) => {
  if (e.target.closest('a')) return;
  const card = e.target.closest('.item-card[data-story-id]');
  if (!card || !card.dataset.storyId) return;
  const item = allItems.find(it => it.story_id === card.dataset.storyId) || allItems.find(it => (it.title || '').slice(0, 30) === card.querySelector('.item-title')?.textContent?.slice(0, 30));
  openStoryModal(card.dataset.storyId, item);
});

document.getElementById('storyList').addEventListener('click', (e) => {
  if (e.target.closest('a')) return;
  const card = e.target.closest('.story-card[data-story-id]');
  if (card) openStoryModal(card.dataset.storyId);
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeStoryModal();
});
async function loadStories() {
  try {
    const resp = await fetch('data/stories-merged.json');
    if (!resp.ok) throw new Error(resp.status);
    const data = await resp.json();
    storiesData = data.stories || [];
    renderStories(storiesData);
  } catch (e) {
    document.getElementById('storyList').innerHTML = `<div class="empty-msg">⚠️ 故事线数据加载失败：${e.message}<br>请确认 data/stories-merged.json 存在</div>`;
  }
}
function renderStories(stories) {
  const list = document.getElementById('storyList');
  const countEl = document.getElementById('storyCount');
  const statsEl = document.getElementById('storyStatsBar');
  if (!stories.length) {
    countEl.textContent = '';
    list.innerHTML = '<div class="empty-msg">暂无故事线数据</div>';
    return;
  }
  // Stats
  const s = stories.filter(s => s.importance_label === 'S').length;
  const a = stories.filter(s => s.importance_label === 'A').length;
  const multi = stories.filter(s => s.source_count >= 3).length;
  statsEl.innerHTML = `
    <div class="stat-card s"><div class="num">${s}</div><div class="label">S 故事</div></div>
    <div class="stat-card a"><div class="num">${a}</div><div class="label">A 故事</div></div>
    <div class="stat-card"><div class="num">${multi}</div><div class="label">≥3源</div></div>
    <div class="stat-card"><div class="num">${stories.length}</div><div class="label">总计</div></div>`;
  countEl.textContent = `共 ${stories.length} 条故事线`;

  list.innerHTML = stories.map(s => {
    const impCls = `grade-${s.importance_label}`;
    const timeStr = s.latest_at ? formatTime(s.latest_at) : '';
    const srcNames = (s.source_names || []).join(', ');
    const trend = s.heat_trend || [];
    const delta = Number(s.heat_delta || 0);
    const trendHtml = trend.length >= 2 ? formatHeatText(trend, delta) : '';
    return `<div class="story-card clickable" data-story-id="${s.story_id || ''}" style="cursor:pointer">
      <div class="story-badges">
        <span class="grade-badge ${impCls}">${s.importance_label}</span>
        <span class="score-pill">${s.importance_score}</span>
        <span class="source-badge type-radar">${s.source_count}源</span>
      </div>
      <div class="story-title"><a href="${s.primary_url || '#'}" target="_blank" rel="noopener">${translateTitle(s.title)}</a></div>
      <div class="story-meta">
        <span>📡 ${s.source_count} 个信源</span>
        <span>📦 ${s.item_count} 条</span>
        ${timeStr ? `<span>🕐 ${timeStr}</span>` : ''}
      </div>
      ${srcNames ? `<div class="story-sources">📰 覆盖: ${srcNames}</div>` : ''}
      ${trendHtml}
    </div>`;
  }).join('');
}

// === Health panel ===
let healthData = null;
let allHealthSites = [];
async function loadHealth() {
  try {
    // Load from source-status.json (produced by radar.py)
    let resp = await fetch('data/source-status.json');
    if (!resp.ok) throw new Error(resp.status + ' (source-status.json)');
    const data = await resp.json();
    healthData = data;
    allHealthSites = data.sites || [];
    renderHealth(allHealthSites, data);
  } catch (e) {
    // Fallback: compute from items snapshot
    document.getElementById('healthSummary').innerHTML = `<div class="empty-msg">⚠️ 信源健康数据加载失败：${e.message}</div>`;
  }
}
function renderHealth(sites, summary) {
  // Summary cards
  document.getElementById('healthSummary').innerHTML = `
    <div class="health-card"><div class="num">${summary.successful_sites}</div><div class="label">✅ 成功</div></div>
    <div class="health-card"><div class="num">${summary.failed_sites}</div><div class="label">❌ 失败</div></div>
    <div class="health-card"><div class="num">${summary.source_count}</div><div class="label">总信源</div></div>
    <div class="health-card"><div class="num">${summary.total_items}</div><div class="label">总条目</div></div>
    <div class="health-card ${summary.ai_pct_total > 30 ? 's' : ''}"><div class="num">${summary.ai_pct_total}%</div><div class="label">AI 占比</div></div>`;
  document.getElementById('healthCount').textContent = `共 ${sites.length} 个信源 · 公众号 ${sites.filter(s=>s.platform==='wechat').length} · Twitter ${sites.filter(s=>s.platform==='twitter').length} · 小红书 ${sites.filter(s=>s.platform==='xiaohongshu').length}`;

  // Table rows
  const tbody = document.getElementById('healthBody');
  tbody.innerHTML = sites.map(site => {
    const statusCls = site.ok ? 'ok' : 'fail';
    const statusTxt = site.ok ? (site.item_count > 0 ? '✅' : (site.soft_fail ? '⚪' : '✅')) : '❌';
    const barW = Math.min(site.ai_pct, 100);
    const platform = site.platform || '-';
    return `<tr>
      <td><span title="${site.site_id}">${site.site_name}</span></td>
      <td>${platform}</td>
      <td><span class="${statusCls}">${statusTxt}</span></td>
      <td>${site.item_count}</td>
      <td>${site.ai_count}</td>
      <td><span class="ai-bar" style="width:${barW}px"></span>${site.ai_pct}%</td>
      <td>${site.fetch_duration_s}</td>
      <td>${site.note || ''}</td>
    </tr>`;
  }).join('');
}

// Load
loadData();
setInterval(loadData, 300000);
